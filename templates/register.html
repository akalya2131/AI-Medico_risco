{% extends 'layout.html' %}
{% block title %}Register | AI Healthcare Intelligence{% endblock %}
{% block content %}
<section class="mx-auto flex min-h-[82vh] max-w-3xl items-center justify-center">
    <div class="glass w-full rounded-[2rem] p-8 sm:p-10">
        <p class="text-sm uppercase tracking-[0.35em] text-slate-400">Launch Workspace</p>
        <h2 class="mt-3 text-3xl font-semibold">Create your premium healthcare platform</h2>
        <form method="post" class="mt-8 grid gap-5 sm:grid-cols-2">
            <div class="sm:col-span-2"><input class="input-shell" type="text" name="full_name" placeholder="Dr. Aditi Rao" required></div>
            <div><input class="input-shell" type="email" name="email" placeholder="aditi@hospital.ai" required></div>
            <div><input class="input-shell" type="password" name="password" placeholder="Minimum 8 characters" required></div>
            <div class="sm:col-span-2">
                <select class="input-shell" name="role" required>
                    <option value="doctor">Doctor</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div class="sm:col-span-2"><button class="w-full rounded-2xl bg-gradient-to-r from-violet-700 to-teal-400 px-4 py-3 font-medium text-slate-950" type="submit">Create Workspace</button></div>
        </form>
    </div>
</section>
{% endblock %}
